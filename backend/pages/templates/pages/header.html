{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Unpaid{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'pages/header.css' %}">
</head>
<body>
    <div id="header">
        <div id="menu">
            <a class="menu-button" href="/">Home</a>
            <a class="menu-button" href="/search/posts/0">Posts</a>
            <a class="menu-button" href="/newpost">Create post</a>
            <a class="menu-button" href="/profile">My Profile</a>
            {% if user.is_authenticated %}
                <a class="menu-button" href="/profile/logout_user">Logout</a>
            {% else %}
                <a class="menu-button" href="/profile/login">Login</a>
            {% endif %}
        </div>
    </div>
    <div id="content">
        {% block content %} <p>some text</p> {% endblock %}
    </div>

</body>
</html>
